<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <title>Task 3 - Semantic Layout Challenge</title> 

    <link rel="stylesheet" href="style.css"> 

</head> 

<body> 

  

    <div class="page-container"> 

  

        <header> 

            <!-- TASK: Add Logo div and Heading 1 here --> 
            <h3 class="label">header</h3>
            <div class="logo">
                <h2>Logo image</h2>
            </div>
            <h1>Heading 1</h1>


        </header> 

  

        <nav> 
            <h2 class="label">nav</h2>
            <h1>unordered list of stuff
            <!-- TASK: Create a list for: Home, About Us, Contact Us --> 

        </nav> 

  

        <main class="main-content"> 
            <h2 class="label" id="maincontentdiv">div</h2>
            <!-- TASK: Add the two content boxes (text and image) --> 
            <div class="content-box">
                <h2 class="label">div</h2>
                <h2>Heading 2</h2>
                <h2>Paragraph of information text</h2>
            </div>
            <div class="image-box">
                <h1 class="label">div</h1>
                <h1>image</h1>
            </div>

        </main> 

  

        <footer> 

            <!-- TASK: Add footer info and the social links div --> 
            <h1 class="label">footer</h1>
            <h1>Unordered list of footer info</h1>
            <div class="social-links">
                <h1 class="label">div</h1>
                <h1>Social media links</h1>
            </div>
        </footer> 

  

    </div> 

  

</body> 

</html>
